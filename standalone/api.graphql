schema {
  query: Query
  mutation: Mutation
}

type Query {
  tasks(status: Status): [Task!]!
}

type Mutation {
  addTask(input: AddTaskInput!): Task!
}

enum Status {
  TODO
  DOING
  DONE
}

type Task {
  id: ID!
  title: String!
  status: Status!
}

input AddTaskInput {
  title: String!
  status: Status = TODO
}
